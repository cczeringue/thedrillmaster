<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=EB+Garamond:ital,wght@0,500;0,700;1,500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1600px;
    background: #f5ede4;
    overflow: hidden;
    position: relative;
    font-family: 'Playfair Display', Georgia, serif;
  }

  .card {
    position: absolute;
    inset: 54px;
    overflow: hidden;
    border-radius: 86px;
    background: #6ea69e;
    box-shadow: 0 26px 0 rgba(41, 21, 27, 0.16);
  }

  .art {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .figure {
    position: absolute;
    width: 1120px;
    height: auto;
    right: -470px;
    bottom: 380px;
  }

  .logo {
    position: absolute;
    left: 92px;
    top: 124px;
    width: 560px;
    height: auto;
    z-index: 2;
  }

  .footer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 4;
    min-height: 430px;
    padding: 84px 76px 72px;
    background: #29151b;
    color: #f5ede4;
  }

  .title {
    font-size: 86px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 0.95;
    color: #f5ede4;
    margin-bottom: 30px;
  }

  .tagline {
    max-width: 820px;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 40px;
    font-style: italic;
    line-height: 1.16;
    color: #d4c4b5;
  }

  .bar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 18px;
    background: #f37478;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="art">
      <img class="figure" src="public/brand/cape-large.svg" alt="" />
      <img class="logo" src="public/brand/title-white.svg" alt="The Drillmaster" />
    </div>
    <div class="footer">
      <h1 class="title">The Drillmaster</h1>
      <p class="tagline">The mostly true story of America&apos;s GAYEST founding daddy.</p>
    </div>
    <div class="bar"></div>
  </div>
</body>
</html>
