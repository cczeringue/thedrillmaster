<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1600px;
    background: #f5ede4;
    overflow: hidden;
    position: relative;
  }

  .card {
    position: absolute;
    inset: 54px;
    overflow: hidden;
    border-radius: 86px;
    background: #6ea69e;
    box-shadow: 0 26px 0 rgba(41, 21, 27, 0.16);
  }

  .art {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .figure {
    position: absolute;
    width: 1320px;
    height: auto;
    right: -650px;
    bottom: -10px;
  }

  .logo {
    position: absolute;
    left: 92px;
    top: 120px;
    width: 570px;
    height: auto;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="art">
      <img class="figure" src="public/brand/cape-large.svg" alt="" />
      <img class="logo" src="public/brand/title-white.svg" alt="The Drillmaster" />
    </div>
  </div>
</body>
</html>
